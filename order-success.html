<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Success | Visionix</title>

    <link rel="stylesheet" href="/styles/style.css">
    <link rel="stylesheet" href="/styles/home.css">
    <link rel="stylesheet" href="/styles/order-success.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>

    <div id="navbar" class="navbar-sticky"></div>

    <section class="success-section section">
        <div class="container success-container">

            <!-- Success Icon -->
            <div class="success-icon">
                <i class="fas fa-check"></i>
            </div>

            <h2>Order Placed Successfully 🎉</h2>
            <p class="success-msg">Thank you for shopping with Visionix</p>

            <!-- Order Info -->
            <div class="order-info">
                <p><strong>Order ID:</strong> <span id="order-id"></span></p>
                <p><strong>Date:</strong> <span id="order-date"></span></p>
                <p><strong>Payment:</strong> <span id="order-payment"></span></p>
            </div>

            <!-- Items -->
            <div class="order-items" id="order-items"></div>

            <!-- Total -->
            <div class="order-total">
                <span>Total Paid</span>
                <h3 id="order-total"></h3>
            </div>

            <!-- Buttons -->
            <div class="success-actions">
                <a href="shop.html" class="btn btn-outline">Continue Shopping</a>
                <a href="index.html" class="btn btn-primary">Go Home</a>
            </div>

        </div>
    </section>


    <script src="/scripts/navfooter.js"></script>
    <script src="/scripts/auth.js"></script>
    <script src="./scripts/home.js"></script>
    <script src="./scripts/order-success.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        confetti({
            particleCount: 150,
            spread: 80,
            origin: {
                y: 0.6
            }
        });
    </script>

</body>

</html>
